        let provider, signer, minhaConta;

        async function conectar() {
            if (window.ethereum) {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                minhaConta = await signer.getAddress();
                document.getElementById("conta").innerText = "Conectado: " + minhaConta;
            } else {
                alert("Instale MetaMask!");
            }
        }

        async function mintNFT() {
            const to = document.getElementById("mintTo").value;
            const nft = new ethers.Contract(NFT_ADDR, nftABI, signer);
            try {
                const tx = await nft.safeMint(to);
                await tx.wait();
                document.getElementById("mintResult").innerText = "NFT mintado com sucesso! Tx: " + tx.hash;
            } catch (e) {
                document.getElementById("mintResult").innerText = "Erro: " + e.message;
            }
        }

        async function stake() {
            const amount = document.getElementById("stakeAmount").value;
            const token = new ethers.Contract(TOKEN_ADDR, tokenABI, signer);
            const staking = new ethers.Contract(STAKING_ADDR, stakingABI, signer);
            try {
                // Primeiro aprovar o staking contract
                const approveTx = await token.approve(STAKING_ADDR, ethers.utils.parseEther(amount));
                await approveTx.wait();
                const tx = await staking.stake(ethers.utils.parseEther(amount));
                await tx.wait();
                document.getElementById("stakeResult").innerText = "Stake realizado! Tx: " + tx.hash;
            } catch (e) {
                document.getElementById("stakeResult").innerText = "Erro: " + e.message;
            }
        }

        async function withdrawStake() {
            const amount = document.getElementById("stakeAmount").value;
            const staking = new ethers.Contract(STAKING_ADDR, stakingABI, signer);
            try {
                const tx = await staking.withdraw(ethers.utils.parseEther(amount));
                await tx.wait();
                document.getElementById("stakeResult").innerText = "Saque/recompensa concluído. Tx: " + tx.hash;
            } catch (e) {
                document.getElementById("stakeResult").innerText = "Erro: " + e.message;
            }
        }

        async function claimNFT() {
            const staking = new ethers.Contract(STAKING_ADDR, stakingABI, signer);
            try {
                const tx = await staking.claimNFT();
                await tx.wait();
                document.getElementById("stakeResult").innerText = "NFT resgatado! Tx: " + tx.hash;
            } catch (e) {
                document.getElementById("stakeResult").innerText = "Erro: " + e.message;
            }
        }

        async function vote(support) {
            const propId = document.getElementById("proposalId").value;
            const dao = new ethers.Contract(DAO_ADDR, daoABI, signer);
            try {
                const tx = await dao.vote(propId, support);
                await tx.wait();
                document.getElementById("voteResult").innerText = "Voto registrado! Tx: " + tx.hash;
            } catch (e) {
                document.getElementById("voteResult").innerText = "Erro: " + e.message;
            }
        }
